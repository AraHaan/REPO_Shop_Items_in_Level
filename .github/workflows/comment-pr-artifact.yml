name: Comment PR artifact

on:
  workflow_run:
    workflows:
      - Build and release
    types:
      - completed

permissions:
  actions: read
  issues: write
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Post artifact link to pull request
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const marker = '<!-- repo-shop-items-in-level-artifact -->';
            const run = context.payload.workflow_run;
            const pullRequest = run.pull_requests?.[0];

            if (!pullRequest) {
              core.info('No pull request associated with workflow run.');
              return;
            }

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            });

            const artifactName = `REPO_Shop_Items_in_Level-${run.head_sha}`;
            const artifact = artifacts.artifacts.find(candidate => candidate.name === artifactName);

            if (!artifact) {
              core.warning(`No artifact named ${artifactName} found for run ${run.id}.`);
              return;
            }

            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run.id}/artifacts/${artifact.id}`;
            const body = [
              marker,
              `Build artifact for this PR: [${artifact.name}](${artifactUrl})`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
              per_page: 100,
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullRequest.number,
                body,
              });
            }
